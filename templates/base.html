{% load i18n %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudySynth - Premium Learning{% endblock %}</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                radial-gradient(circle at bottom left, #064e3b, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            color: transparent;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #3b82f6;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        main {
            flex: 1;
            padding: 3rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.8);
        }
        [data-theme="light"] body {
            background-image: radial-gradient(circle at top right, #e2e8f0, transparent 40%),
                radial-gradient(circle at bottom left, #cbd5e1, transparent 40%);
        }
        [data-theme="light"] nav {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        [data-theme="light"] nav a { color: #0f172a; }
        [data-theme="light"] .course-card { color: #0f172a; }
        [data-theme="light"] .course-title { color: #0f172a; }
        [data-theme="light"] .course-desc { color: #475569; }
        [data-theme="light"] .detail-card h1 { color: #0f172a !important; }
        [data-theme="light"] .detail-card h4 { color: #0f172a !important; }
        [data-theme="light"] .lesson-item { background: rgba(0,0,0,0.05); }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>
    <nav>
        <a href="{% url 'home' %}" style="margin:0; text-decoration:none;">
            <h1>StudySynth</h1>
        </a>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <!-- Theme Toggle -->
            <button id="theme-toggle" style="background: transparent; border: none; color: inherit; font-size: 1.2rem; cursor: pointer;" title="Toggle Dark/Light Mode">🌓</button>

            <!-- Language Switcher -->
            <form action="/i18n/setlang/" method="post" style="margin: 0; display: flex; align-items: center;">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.path }}">
                <select name="language" onchange="this.form.submit()" style="background: transparent; color: inherit; border: 1px solid rgba(128,128,128,0.5); padding: 0.4rem; border-radius: 8px; outline: none; cursor: pointer; font-size: 0.9rem;">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% for lang in LANGUAGES %}
                    <option value="{{ lang.0 }}" {% if lang.0 == LANGUAGE_CODE %}selected{% endif %} style="color: black;">
                        {{ lang.1 }}
                    </option>
                    {% endfor %}
                </select>
            </form>

            {% if user.is_authenticated %}
            <a href="/admin/">Dashboard</a>
            <a href="{% url 'logout' %}">Logout</a>
            {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="btn-primary">Get Started</a>
            {% endif %}
        </div>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        root.setAttribute('data-theme', savedTheme);

        themeBtn.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>


</html>
